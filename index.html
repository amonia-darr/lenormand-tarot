<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lenormand</title>
</head>
<body>
<h1>Lenormand Reading</h1>
<select id="type">
<option value="1">1 card</option>
<option value="3" selected>3 cards</option>
</select>
<select id="count"></select>
<button onclick="draw()">Draw</button>
<div id="board"></div>
<div id="result" style="display:none"></div>
<button onclick="reset()">Reset</button>
<script>
const deck=[{n:1,t:"骑士",k:"消息,快速,来访,变化",d:"带来消息或变化。"},{n:2,t:"三叶草",k:"机会,运气,短暂,希望",d:"小幸运。"},{n:3,t:"船",k:"旅行,移动,远行,变化",d:"长途旅行。"},{n:4,t:"房屋",k:"家庭,安全,根基,隐私",d:"家庭、房产。"},{n:5,t:"树木",k:"成长,健康,韧性,长寿",d:"成长、健康。"},{n:6,t:"云朵",k:"困惑,模糊,不确定,秘密",d:"困惑、不确定。"},{n:7,t:"蛇",k:"欺骗,复杂,智慧,诱惑",d:"复杂情况。"},{n:8,t:"棺材",k:"结束,转变,停滞,损失",d:"结束或转变。"},{n:9,t:"花朵",k:"美丽,喜悦,成功,声誉",d:"喜悦、成功。"},{n:10,t:"镰刀",k:"切断,危险,决定,痛苦",d:"突然的切断。"},{n:11,t:"棍棒",k:"冲突,竞争,力量,坚持",d:"冲突、竞争。"},{n:12,t:"鸟",k:"交流,消息,噪音,焦虑",d:"消息、交流。"},{n:13,t:"小孩",k:"新生,纯真,开始,小东西",d:"新开始、纯真。"},{n:14,t:"狐狸",k:"策略,欺骗,聪明,适应",d:"需要智取。"},{n:15,t:"熊",k:"力量,保护,母亲,财务",d:"力量、保护。"},{n:16,t:"星星",k:"希望,灵感,平静,目标",d:"希望、灵感。"},{n:17,t:"月亮",k:"直觉,梦境,女性,周期",d:"直觉、梦境。"},{n:18,t:"太阳",k:"成功,活力,快乐,权威",d:"成功、活力。"},{n:19,t:"彩虹",k:"希望,改善,多样性,和解",d:"希望、改善。"},{n:20,t:"塔",k:"隔离,机构,限制,权威",d:"隔离、限制。"},{n:21,t:"山",k:"障碍,挑战,阻力,坚持",d:"障碍、挑战。"},{n:22,t:"路径",k:"选择,方向,旅程,决定",d:"选择、方向。"},{n:23,t:"老鼠",k:"损失,焦虑,消耗,小偷",d:"损失、焦虑。"},{n:24,t:"心",k:"爱,情感,快乐,中心",d:"爱、情感。"},{n:25,t:"戒指",k:"承诺,合约,婚姻,循环",d:"承诺、合约。"},{n:26,t:"书本",k:"知识,学习,秘密,研究",d:"知识、学习。"},{n:27,t:"信",k:"消息,文件,沟通,文书",d:"消息、文件。"},{n:28,t:"男人",k:"男性,个人,主动,能量",d:"男性特质。"},{n:29,t:"女人",k:"女性,个人,接受,直觉",d:"女性特质。"},{n:30,t:"百合",k:"纯洁,和平,婚姻,和谐",d:"纯洁、和平。"},{n:31,t:"太阳",k:"成功,活力,快乐,权威",d:"成功、活力。"},{n:32,t:"月亮",k:"直觉,梦境,女性,周期",d:"直觉、梦境。"},{n:33,t:"钥匙",k:"解决方案,访问,重要,解锁",d:"解决方案。"},{n:34,t:"鱼",k:"财富,丰盛,流动,资源",d:"财富、丰盛。"},{n:35,t:"锚",k:"稳定,安全,基础,坚持",d:"稳定、安全。"},{n:36,t:"十字架",k:"责任,负担,牺牲,命运",d:"责任、负担。"}];
const spreads={1:[{l:"Card"}],3:[{l:"Past"},{l:"Present"},{l:"Future"}]};
let cards=[],spread=[];
function shuffle(d){let a=[...d];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function updateCount(){document.getElementById('count').value=document.getElementById('type').value}
function draw(){
  const c=parseInt(document.getElementById('count').value);
  const t=document.getElementById('type').value;
  cards=shuffle(deck).slice(0,c);
  spread=spreads[t];
  const b=document.getElementById('board');
  b.innerHTML='';
  spread.forEach((p,i)=>{
    const d=document.createElement('div');
    d.style.border='1px solid #ccc';
    d.style.padding='10px';
    d.style.margin='5px';
    d.innerHTML='<div>'+p.l+'</div>';
    if(cards[i]){
      d.innerHTML+='<div style="background:#667eea;color:white;padding:5px;margin:5px 0;">'+cards[i].n+'</div>';
      d.innerHTML+='<div>'+cards[i].t+'</div>';
    }
    b.appendChild(d);
  });
  const r=document.getElementById('result');
  r.style.display='block';
  r.innerHTML='<h2>Reading</h2><p>Cards: '+cards.map(x=>x.t).join(' -> ')+'</p>';
  cards.forEach((c,i)=>{
    r.innerHTML+='<h3>'+spread[i].l+': '+c.t+'</h3><p><strong>Keywords:</strong> '+c.k+'</p><p>'+c.d+'</p>';
  });
}
function reset(){
  cards=[];
  document.getElementById('result').style.display='none';
  document.getElementById('board').innerHTML='';
}
window.onload=function(){
  document.getElementById('type').onchange=updateCount;
  updateCount();
};
</script>
</body>
</html>
